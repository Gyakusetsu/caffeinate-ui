name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

  release:
    runs-on: macos-15
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Create app bundle
        run: |
          APP_NAME="Caffeinate UI"
          BUNDLE_DIR=".build/release/${APP_NAME}.app"
          CONTENTS_DIR="${BUNDLE_DIR}/Contents"
          MACOS_DIR="${CONTENTS_DIR}/MacOS"

          mkdir -p "${MACOS_DIR}" "${CONTENTS_DIR}/Resources"
          cp .build/release/CaffeinateUI "${MACOS_DIR}/CaffeinateUI"
          cp Resources/Info.plist "${CONTENTS_DIR}/Info.plist"
          cp Resources/AppIcon.icns "${CONTENTS_DIR}/Resources/AppIcon.icns"

      - name: Zip app bundle
        run: |
          cd .build/release
          zip -r "Caffeinate-UI-${GITHUB_REF_NAME}.zip" "Caffeinate UI.app"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ".build/release/Caffeinate-UI-${{ github.ref_name }}.zip"
